spring:
  application:
    name: hiliving-backend
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_batch_fetch_size: 50
  servlet:
    multipart:
      max-file-size: ${HILIVING_MEDIA_MULTIPART_MAX_FILE_SIZE:8MB}
      max-request-size: ${HILIVING_MEDIA_MULTIPART_MAX_REQUEST_SIZE:9MB}
      file-size-threshold: 0

hiliving:
  media:
    storage-path: ${HILIVING_MEDIA_STORAGE_PATH:../infrastructure/data/uploads}

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  servlet:
    session:
      cookie:
        http-only: true
        same-site: lax
        secure: ${SESSION_COOKIE_SECURE:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
